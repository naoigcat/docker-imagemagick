name: Push to Docker Hub

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      -
        name: Generate meta data
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/imagemagick
          tags: |
            type=ref,event=tag,priority=900
            type=match,pattern=(\d+\.\d+\.\d+)-\d+,group=1,priority=830
            type=match,pattern=(\d+\.\d+)\.\d+-\d+,group=1,priority=820
            type=match,pattern=(\d+)\.\d+\.\d+-\d+,group=1,priority=810
      -
        name: Login
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and Push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
