name: Push to Docker Hub

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      -
        name: Generate meta data
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/imagemagick
          tags: |
            type=ref,event=tag,priority=900
            type=match,pattern=(\d+\.\d+\.\d+)-\d+,group=1,priority=830
            type=match,pattern=(\d+\.\d+)\.\d+-\d+,group=1,priority=820
            type=match,pattern=(\d+)\.\d+\.\d+-\d+,group=1,priority=810
      -
        name: Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and Push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
