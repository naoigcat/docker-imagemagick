name: Push to Docker Hub

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      -
        name: Generate meta data
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/imagemagick
          tags: |
            type=ref,event=tag,priority=900
            type=match,pattern=(\d+\.\d+\.\d+)-\d+,group=1,priority=830
            type=match,pattern=(\d+\.\d+)\.\d+-\d+,group=1,priority=820
            type=match,pattern=(\d+)\.\d+\.\d+-\d+,group=1,priority=810
      -
        name: Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and Push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
